<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#08111d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Jet Fuel Converter">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Jet Fuel Converter</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://api.open-meteo.com">
  <link rel="preconnect" href="https://geocoding-api.open-meteo.com">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111d;
      --bg-soft: #0d1a2b;
      --panel: rgba(12, 24, 38, 0.92);
      --panel-strong: rgba(16, 31, 49, 0.98);
      --panel-border: rgba(120, 170, 220, 0.18);
      --text: #e8f1fb;
      --muted: #9fb3c8;
      --accent: #5db7ff;
      --accent-strong: #8fd3ff;
      --success: #7ce0b8;
      --warning: #ffca8a;
      --danger: #ff8f8f;
      --surface: rgba(255, 255, 255, 0.04);
      --surface-strong: rgba(255, 255, 255, 0.08);
      --shadow: 0 1.5rem 3.75rem rgba(0, 0, 0, 0.35);
      --radius-xl: 1.5rem;
      --radius-lg: 1.125rem;
      --radius-md: 0.875rem;
      --touch-size: 2.75rem;
      --safe-top: env(safe-area-inset-top);
      --safe-right: env(safe-area-inset-right);
      --safe-bottom: env(safe-area-inset-bottom);
      --safe-left: env(safe-area-inset-left);
      --sidebar-width: 17rem;
      --content-width: 78rem;
      --transition: 180ms ease;
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #eef5fb;
      --bg-soft: #dfeaf7;
      --panel: rgba(255, 255, 255, 0.94);
      --panel-strong: rgba(255, 255, 255, 0.98);
      --panel-border: rgba(74, 144, 226, 0.16);
      --text: #102033;
      --muted: #4f647d;
      --accent: #1f7ae0;
      --accent-strong: #0f5fb8;
      --success: #1f9d6a;
      --warning: #b86b00;
      --danger: #c53d3d;
      --surface: rgba(16, 32, 51, 0.04);
      --surface-strong: rgba(16, 32, 51, 0.08);
      --shadow: 0 1.5rem 3.75rem rgba(31, 72, 120, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      max-width: 100vw;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      -webkit-text-size-adjust: 100%;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(93, 183, 255, 0.18), transparent 32%),
        linear-gradient(180deg, var(--bg) 0%, color-mix(in srgb, var(--bg) 82%, black) 100%);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    input,
    select,
    textarea {
      font-size: max(16px, 1rem);
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app-shell {
      min-height: 100vh;
      display: flex;
      width: 100%;
      max-width: 100%;
    }

    .sidebar {
      width: min(var(--sidebar-width), 100%);
      padding: calc(1.25rem + var(--safe-top)) 1rem calc(1.25rem + var(--safe-bottom)) calc(1rem + var(--safe-left));
      border-right: 1px solid var(--panel-border);
      background: rgba(6, 14, 24, 0.72);
      backdrop-filter: blur(1rem);
      display: none;
      flex-direction: column;
      gap: 1rem;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand-card,
    .panel,
    .tabbar,
    .sidebar-nav a,
    .quick-city-button,
    .chip,
    .action-button,
    .ghost-button,
    .table-wrap,
    .faq-reference,
    .weather-card,
    .result-card,
    .history-item,
    .log-stat,
    .map-card,
    .settings-card {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
    }

    .brand-card {
      border-radius: var(--radius-xl);
      padding: 1.25rem;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 3rem;
      height: 3rem;
      border-radius: 1rem;
      background: linear-gradient(135deg, rgba(93, 183, 255, 0.24), rgba(124, 224, 184, 0.18));
      font-size: 1.5rem;
      margin-bottom: 0.875rem;
    }

    .brand-card h1,
    .home-hero h2 {
      margin: 0;
      line-height: 1.1;
    }

    .brand-card p,
    .home-hero p,
    .muted,
    .faq-reference p,
    .history-item small,
    .weather-card small,
    .log-stat small {
      color: var(--muted);
      line-height: 1.5;
    }

    .sidebar-nav {
      display: grid;
      gap: 0.75rem;
    }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      min-height: 3.25rem;
      border-radius: 1rem;
      padding: 0.875rem 1rem;
      transition: transform var(--transition), border-color var(--transition), background var(--transition);
    }

    .sidebar-nav a.active,
    .tabbar a.active {
      background: linear-gradient(180deg, rgba(93, 183, 255, 0.18), rgba(93, 183, 255, 0.08));
      border-color: rgba(93, 183, 255, 0.38);
      color: var(--accent-strong);
    }

    .sidebar-nav a:hover,
    .tabbar a:hover,
    .chip:hover,
    .action-button:hover,
    .ghost-button:hover,
    .quick-city-button:hover {
      transform: translateY(-0.0625rem);
      border-color: rgba(143, 211, 255, 0.34);
    }

    .sidebar-nav .icon,
    .tabbar .icon {
      font-size: 1.125rem;
      width: 1.5rem;
      text-align: center;
    }

    .main {
      flex: 1;
      min-width: 0;
      padding: calc(1rem + var(--safe-top)) calc(1rem + var(--safe-right)) calc(5.75rem + var(--safe-bottom)) calc(1rem + var(--safe-left));
    }

    .main-inner {
      width: min(100%, var(--content-width));
      margin: 0 auto;
      display: grid;
      gap: 1rem;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .topbar-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.625rem 0.875rem;
      border-radius: 999px;
      background: rgba(93, 183, 255, 0.12);
      color: var(--accent-strong);
      font-size: 0.875rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .topbar-status {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-pill {
      padding: 0.625rem 0.875rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      font-size: 0.875rem;
    }

    .page {
      display: none;
      opacity: 0;
      transform: translateY(0.5rem);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .page.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }

    .page-stack,
    .grid,
    .grid-2,
    .grid-3,
    .weather-grid,
    .results-grid,
    .stats-grid,
    .home-grid,
    .faq-grid {
      display: grid;
      gap: 1rem;
    }

    .grid-2,
    .weather-grid,
    .results-grid,
    .stats-grid,
    .faq-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .grid-3,
    .home-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .panel,
    .settings-card,
    .map-card {
      border-radius: var(--radius-xl);
      padding: 1.25rem;
      min-width: 0;
      overflow: hidden;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      align-items: flex-start;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }

    .page-header-textless {
      margin-bottom: 0;
    }

    .section-title {
      margin: 0 0 0.375rem;
      font-size: 1.05rem;
    }

    .field {
      display: grid;
      gap: 0.5rem;
      min-width: 0;
    }

    .field label,
    .inline-label {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      min-height: var(--touch-size);
      border-radius: 1rem;
      border: 1px solid rgba(143, 211, 255, 0.18);
      background: linear-gradient(180deg, rgba(4, 10, 18, 0.96), rgba(8, 16, 28, 0.96));
      color: var(--text);
      padding: 0.875rem 1rem;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    :root[data-theme="light"] .field input,
    :root[data-theme="light"] .field select,
    :root[data-theme="light"] .field textarea {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(240, 247, 255, 0.98));
    }

    .field input:focus,
    .field select:focus,
    .field textarea:focus {
      border-color: rgba(93, 183, 255, 0.6);
      box-shadow: 0 0 0 0.25rem rgba(93, 183, 255, 0.14);
    }

    .chip-row,
    .button-row,
    .quick-city-row,
    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.625rem;
    }

    .toggle-row > .chip-row {
      flex: 1 1 10rem;
    }

    #consumoDeparturePresets,
    #consumoHourlyPresets,
    #consumoMinutesPresets {
      display: flex !important;
      flex-wrap: nowrap !important;
      gap: 4px !important;
      overflow-x: hidden;
    }

    #consumoDeparturePresets .chip,
    #consumoHourlyPresets .chip,
    #consumoMinutesPresets .chip {
      padding: 4px 8px !important;
      font-size: 0.8rem !important;
      min-width: 0 !important;
      min-height: 2rem;
      flex-shrink: 1 !important;
      flex: 1 1 auto;
      white-space: nowrap;
    }

    .chip,
    .action-button,
    .ghost-button,
    .quick-city-button {
      min-height: var(--touch-size);
      border-radius: 1rem;
      padding: 0.75rem 0.95rem;
      color: var(--text);
      transition: transform var(--transition), border-color var(--transition), background var(--transition);
    }

    .chip,
    .quick-city-button,
    .ghost-button {
      background: var(--surface);
    }

    .chip.active {
      background: rgba(93, 183, 255, 0.16);
      border-color: rgba(93, 183, 255, 0.38);
      color: var(--accent-strong);
    }

    .preset-active {
      background: #22c55e !important;
      border-color: #22c55e !important;
      color: #ffffff !important;
    }

    #geoToggle.geo-on {
      background: #22c55e !important;
      border-color: #22c55e !important;
      color: #ffffff !important;
    }

    #geoToggle.geo-off {
      background: #eab308 !important;
      border-color: #eab308 !important;
      color: #1f2937 !important;
    }

    #coordsToggleButton.coords-on {
      background: #22c55e !important;
      border-color: #22c55e !important;
      color: #ffffff !important;
    }

    #coordsToggleButton.coords-off {
      background: #eab308 !important;
      border-color: #eab308 !important;
      color: #1f2937 !important;
    }

    .action-button {
      background: linear-gradient(180deg, rgba(93, 183, 255, 0.24), rgba(93, 183, 255, 0.14));
      border: 1px solid rgba(93, 183, 255, 0.38);
    }

    .whatsapp-button {
      background: #25D366;
      border: 1px solid #25D366;
      color: #062b12;
      font-weight: 600;
    }

    .whatsapp-button:hover {
      background: #20bd5b;
      border-color: #20bd5b;
    }

    .ghost-button {
      border: 1px solid rgba(143, 211, 255, 0.18);
    }

    .conversion-actions {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.5rem;
    }

    .conversion-actions > button {
      flex: 1 1 0;
      min-width: 0;
      padding: 0.7rem 0.75rem;
      font-size: 0.92rem;
      white-space: nowrap;
    }

    @media (max-width: 420px) {
      .conversion-actions {
        gap: 0.4rem;
      }

      .conversion-actions > button {
        padding: 0.65rem 0.55rem;
        font-size: 0.82rem;
      }
    }

    .slider-wrap {
      display: grid;
      gap: 0.625rem;
    }

    .slider {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 0.875rem;
      border-radius: 999px;
      background: transparent;
      margin: 0;
    }

    .slider::-webkit-slider-runnable-track {
      height: 0.875rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid color-mix(in srgb, var(--accent-strong) 18%, transparent);
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      margin-top: -0.3125rem;
      border: 0.125rem solid rgba(255, 255, 255, 0.9);
      background: linear-gradient(180deg, #f7fbff 0%, #b9d8f4 100%);
      box-shadow: 0 0.25rem 0.875rem rgba(0, 0, 0, 0.25);
    }

    .slider::-moz-range-track {
      height: 0.875rem;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid color-mix(in srgb, var(--accent-strong) 18%, transparent);
    }

    .slider::-moz-range-thumb {
      width: 1.5rem;
      height: 1.5rem;
      border-radius: 50%;
      border: 0.125rem solid rgba(255, 255, 255, 0.9);
      background: linear-gradient(180deg, #f7fbff 0%, #b9d8f4 100%);
    }

    .result-card,
    .weather-card,
    .history-item,
    .log-stat,
    .faq-reference {
      border-radius: var(--radius-lg);
      padding: 1rem;
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .weather-card[data-tone="cool"] {
      background: rgba(93, 183, 255, 0.2);
    }

    .weather-card[data-tone="good"] {
      background: rgba(124, 224, 184, 0.18);
    }

    .weather-card[data-tone="warn"] {
      background: rgba(255, 170, 92, 0.2);
    }

    .weather-card[data-tone="danger"] {
      background: rgba(255, 120, 120, 0.2);
    }

    .weather-card[data-tone="cloud"] {
      background: rgba(148, 158, 171, 0.22);
    }

    .weather-card[data-tone="rain"] {
      background: rgba(72, 82, 96, 0.34);
    }

    .weather-card[data-tone="sun"] {
      background: rgba(255, 196, 87, 0.22);
      border-color: rgba(255, 159, 28, 0.34);
    }

    .result-card strong,
    .weather-card strong,
    .log-stat strong {
      display: block;
      margin-bottom: 0.375rem;
    }

    .result-value {
      font-size: clamp(1.35rem, 4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .weather-icon {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .map-card {
      display: grid;
      gap: 1rem;
    }

    #map {
      width: 100%;
      min-height: 20rem;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--panel-border);
    }

    .leaflet-container {
      width: 100%;
      height: 100%;
      filter: saturate(0.92) brightness(0.94);
      background: var(--bg-soft);
    }

    .search-results {
      display: grid;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }

    .coords-panel {
      margin-bottom: 1rem;
      padding: 0.875rem 1rem;
      border-radius: 1rem;
      background: var(--surface);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      font-size: 0.92rem;
      display: grid;
      gap: 0.35rem;
    }

    .coords-panel strong {
      color: var(--text);
    }

    .coords-panel.hidden {
      display: none !important;
    }

    .search-result {
      width: 100%;
      text-align: left;
      border-radius: 1rem;
      border: 1px solid var(--panel-border);
      background: var(--surface);
      color: var(--text);
      padding: 0.875rem 1rem;
    }

    .table-wrap {
      border-radius: var(--radius-xl);
      overflow: auto hidden;
      width: 100%;
      max-width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 42rem;
    }

    th,
    td {
      padding: 0.875rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid rgba(143, 211, 255, 0.12);
      vertical-align: top;
    }

    th button {
      background: transparent;
      border: 0;
      color: inherit;
      padding: 0;
      font-weight: 600;
    }

    details {
      border-radius: var(--radius-lg);
      border: 1px solid var(--panel-border);
      background: var(--surface);
      padding: 1rem;
    }

    summary {
      cursor: pointer;
      font-weight: 600;
    }

    canvas {
      width: 100% !important;
      max-width: 100%;
      height: auto !important;
    }

    .tabbar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 0.5rem;
      padding: 0.75rem calc(0.75rem + var(--safe-right)) calc(0.75rem + var(--safe-bottom)) calc(0.75rem + var(--safe-left));
      background: rgba(6, 14, 24, 0.92);
      backdrop-filter: blur(1rem);
      border-top: 1px solid var(--panel-border);
      z-index: 1000;
      pointer-events: auto;
    }

    .tabbar a {
      min-height: 3.5rem;
      border-radius: 1rem;
      border: 1px solid transparent;
      display: grid;
      place-items: center;
      gap: 0.125rem;
      padding: 0.5rem 0.25rem;
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
      transition: background var(--transition), border-color var(--transition), color var(--transition);
    }

    .tabbar .icon {
      font-size: 1.1rem;
    }

    .home-hero {
      display: grid;
      gap: 1rem;
      align-items: center;
    }

    .hero-card {
      padding: 1.5rem;
      border-radius: var(--radius-xl);
      background: linear-gradient(135deg, rgba(93, 183, 255, 0.18), rgba(124, 224, 184, 0.08));
      border: 1px solid rgba(143, 211, 255, 0.18);
    }

    .flag {
      font-size: 1rem;
    }

    .hidden {
      display: none !important;
    }

    .status-line {
      min-height: 1.5rem;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .danger {
      color: var(--danger);
    }

    .success {
      color: var(--success);
    }

    .qr-box {
      min-height: 10rem;
      display: grid;
      place-items: center;
      border-radius: var(--radius-lg);
      border: 1px dashed rgba(143, 211, 255, 0.28);
      background: rgba(255, 255, 255, 0.02);
      padding: 1rem;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.56);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 60;
    }

    .modal.open {
      display: flex;
    }

    .modal-card {
      width: min(100%, 28rem);
      border-radius: var(--radius-xl);
      background: var(--panel-strong);
      border: 1px solid var(--panel-border);
      padding: 1.25rem;
      box-shadow: var(--shadow);
      display: grid;
      gap: 1rem;
    }

    .inline-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .inline-stats span {
      padding: 0.5rem 0.75rem;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid var(--panel-border);
      color: var(--muted);
      font-size: 0.875rem;
    }

    @media (min-width: 64rem) {
      .sidebar {
        display: flex;
      }

      .tabbar {
        display: none;
      }

      .main {
        padding-bottom: calc(1rem + var(--safe-bottom));
      }
    }

    @media (max-width: 63.9375rem) {
      .grid-3,
      .grid-2,
      .weather-grid,
      .results-grid,
      .stats-grid,
      .faq-grid,
      .home-grid {
        grid-template-columns: 1fr;
      }

      table {
        min-width: 36rem;
      }
    }

    @media (max-width: 30rem) {
      .main {
        padding-left: calc(0.75rem + var(--safe-left));
        padding-right: calc(0.75rem + var(--safe-right));
      }

      .panel,
      .settings-card,
      .map-card,
      .brand-card {
        padding: 1rem;
      }

      .tabbar {
        gap: 0.25rem;

    function loadJson(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch {
        return fallback;
      }
    }

    function saveJson(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function t(key) {
      return translations[state.language][key] ?? key;
    }

    function formatNumber(value, digits = 2) {
      return new Intl.NumberFormat(state.language === 'it' ? 'it-IT' : 'en-US', {
        minimumFractionDigits: digits,
        maximumFractionDigits: digits
      }).format(Number.isFinite(value) ? value : 0);
    }

    function formatDateTime(value) {
      const date = new Date(value);
      return new Intl.DateTimeFormat(state.language === 'it' ? 'it-IT' : 'en-US', {
        dateStyle: 'medium',
        timeStyle: 'short'
      }).format(date);
    }

    function getFuelProfile(key = state.fuelType) {
      return fuelProfiles[key] || fuelProfiles.jetA1;
    }

    function computeDensity(tempC, pressureHpa, fuelKey = state.fuelType) {
      const fuel = getFuelProfile(fuelKey);
      const tempDelta = tempC - 15;
      const pressureDelta = pressureHpa - 1013.25;
      const density = fuel.density15 - tempDelta * fuel.tempCoeff + pressureDelta * fuel.pressureCoeff;
      return Math.max(0.6, density);
    }

    function getCurrentTempC() {
      return Number(els.temperatureInput.value || 0);
    }

    function getCurrentPressureHpa() {
      return Number(els.pressureInput.value || 0);
    }

    function setTemperatureDisplay(tempC) {
      els.temperatureInput.value = formatPlain(tempC, 1);
      els.temperatureSlider.value = formatPlain(tempC, 1);
      updateSliderVisual(els.temperatureSlider, ['#ffd54a', '#ff9f1c', '#ff5a36']);
    }

    function setPressureDisplay(pressureHpa) {
      els.pressureInput.value = formatPlain(pressureHpa, 1);
      els.pressureSlider.value = formatPlain(pressureHpa, 1);
      updateSliderVisual(els.pressureSlider, ['#4da3ff', '#2fd0c8', '#6fe38a']);
    }

    function formatPlain(value, digits = 1) {
      return Number(value).toFixed(digits).replace(/\.0$/, '.0');
    }

    function updateSliderVisual(slider, colors) {
      const styleElement = document.getElementById('dynamicSliderStyles');
      if (!styleElement || !slider?.id) {
        return;
      }
      const track = colors[0] === colors[1] && colors[1] === colors[2]
        ? colors[0]
        : `linear-gradient(90deg, ${colors[0]}, ${colors[1]}, ${colors[2]})`;
      const rule = `#${slider.id}::-webkit-slider-runnable-track { background: ${track} !important; }\n#${slider.id}::-moz-range-track { background: ${track} !important; }`;
      const existing = styleElement.textContent || '';
      const pattern = new RegExp(`#${slider.id}::-(webkit-slider-runnable-track|moz-range-track) \{[^}]*\}\n?`, 'g');
      styleElement.textContent = existing.replace(pattern, '').trim() + (existing.trim() ? '\n' : '') + rule;
    }

    function populateFuelSelects() {
      const options = Object.values(fuelProfiles).map((fuel) => `<option value="${fuel.key}">${fuel.label}</option>`).join('');
      [els.homeFuelType, els.conversionFuelType, els.logFuelType].forEach((select) => {
        select.innerHTML = options;
        select.value = state.fuelType;
      });
    }

    function applyTheme(theme) {
      state.theme = theme;
      localStorage.setItem(storageKeys.theme, theme);
      const resolved = theme === 'system'
        ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        : theme;
      document.documentElement.dataset.theme = resolved;
      document.querySelectorAll('[data-theme-choice]').forEach((button) => {
        button.classList.toggle('active', button.dataset.themeChoice === theme);
      });
      renderSummaries();
    }

    function applyLanguage(language) {
      state.language = language;
      localStorage.setItem(storageKeys.language, language);
      document.documentElement.lang = language;
      document.querySelectorAll('[data-language]').forEach((button) => {
        button.classList.toggle('active', button.dataset.language === language);
      });
      renderTranslations();
      renderWeatherCards();
      renderHistory();
      renderLog();
      renderSummaries();
      renderRoute();
    }

    function applyMode(mode) {
      state.mode = mode;
      localStorage.setItem(storageKeys.mode, mode);
      document.querySelectorAll('[data-mode]').forEach((button) => {
        button.classList.toggle('active', button.dataset.mode === mode);
      });
      updateMassLabel();
      updateConversion();
      renderSummaries();
    }

    function applyFuelType(fuelType) {
      state.fuelType = fuelType;
      localStorage.setItem(storageKeys.fuelType, fuelType);
      [els.homeFuelType, els.conversionFuelType, els.logFuelType].forEach((select) => {
        select.value = fuelType;
      });
      updateConversion();
      updateLogVolumeFromMass();
      renderSummaries();
      renderDensityTable();
    }

    function updateMassLabel() {
      els.massLabel.textContent = state.mode === 'kg-to-liters' ? t('massKg') : t('volumeLiters');
      els.temperatureLabel.textContent = t('temperatureLabelC');
      els.pressureLabel.textContent = t('pressureLabelHpa');
    }

    function updateGeoToggleAppearance() {
      els.geoToggle.textContent = state.geolocationEnabled ? t('geoOn') : t('geoOff');
      els.geoToggle.classList.toggle('geo-on', state.geolocationEnabled);
      els.geoToggle.classList.toggle('geo-off', !state.geolocationEnabled);
    }

    function updateCoordsToggleAppearance() {
      const active = !els.coordsPanel.classList.contains('hidden');
      els.coordsToggleButton.classList.toggle('coords-on', active);
      els.coordsToggleButton.classList.toggle('coords-off', !active);
    }

    function renderTranslations() {
      document.title = 'Jet Fuel Converter';
      document.querySelectorAll('[data-i18n]').forEach((node) => {
        node.textContent = t(node.dataset.i18n);
      });
      els.sidebarSubtitle.textContent = t('sidebarSubtitle');
      els.topbarBadge.textContent = t('appBadge');
      els.citySearch.placeholder = t('citySearchPlaceholder');
      updateGeoToggleAppearance();
      updateCoordsToggleAppearance();
      els.howItWorksText.textContent = t('howItWorksText');
      updateMassLabel();
    }

    function getTemperatureTone(value) {
      if (value >= 36 && value <= 45) return 'danger';
      if (value >= 26 && value <= 35) return 'warn';
      if (value >= 15 && value <= 25) return 'good';
      if (value >= -10 && value <= 14) return 'cool';
      return '';
    }

    function getHumidityTone(value) {
      if (value >= 81) return 'danger';
      if (value >= 51) return 'warn';
      if (value >= 0) return 'good';
      return '';
    }

    function getWindTone(value) {
      if (value >= 66) return 'danger';
      if (value >= 31) return 'warn';
      if (value >= 0) return 'good';
      return '';
    }

    function getConditionTone(code) {
      if ([51, 61, 63, 65, 80, 95].includes(code)) return 'rain';
      if ([2, 3, 45, 48].includes(code)) return 'cloud';
      if ([0, 1].includes(code)) return 'cool';
      return '';
    }

    function renderSummaries() {
      const fuelLabel = getFuelProfile().label;
      const modeLabel = state.mode === 'kg-to-liters' ? t('modeKgToLiters') : t('modeLitersToKg');
      const themeLabel = state.theme === 'light' ? t('themeSummaryLight') : state.theme === 'dark' ? t('themeSummaryDark') : t('themeSummarySystem');
      els.sidebarFuel.textContent = fuelLabel;
      els.sidebarTheme.textContent = themeLabel;
      els.homeSummaryFuel.textContent = fuelLabel;
      els.homeSummaryMode.textContent = modeLabel;
      els.homeSummaryTheme.textContent = themeLabel;
      els.topbarWeather.textContent = state.weather ? `${state.weather.city} · ${formatNumber(state.weather.temperature, 1)}°C` : t('weatherIdle');
    }

    function getRouteFromHash() {
      const rawHash = window.location.hash || '';
      const hash = rawHash.replace('#', '');
      if (!hash) {
        return 'home';
      }
      return routes.includes(hash) ? hash : 'home';
    }

    function syncConversionFromWeather() {
      if (!state.weather) {
        return;
      }
      setTemperatureDisplay(state.weather.temperature);
      setPressureDisplay(state.weather.pressure);
      updateConversion();
    }

    function renderRoute() {
      state.route = getRouteFromHash();
      els.pages.forEach((page) => {
        page.classList.toggle('active', page.id === `page-${state.route}`);
      });
      els.navLinks.forEach((link) => {
        link.classList.toggle('active', link.dataset.route === state.route);
      });
      const routeKey = `route${state.route.charAt(0).toUpperCase()}${state.route.slice(1)}`;
      els.topbarRoute.textContent = t(routeKey);
      if (state.route === 'meteo' && state.map) {
        setTimeout(() => state.map.invalidateSize(), 120);
      }
      if (state.route === 'conversione') {
        if (state.weather) {
          syncConversionFromWeather();
        }
        updateSliderVisual(els.massSlider, ['#ffd54a', '#ffd54a', '#ffd54a']);
        updateSliderVisual(els.temperatureSlider, ['#ffd54a', '#ff9f1c', '#ff5a36']);
        updateSliderVisual(els.pressureSlider, ['#4da3ff', '#2fd0c8', '#6fe38a']);
      }
    }

    function renderQuickCities() {
      els.quickCities.innerHTML = '';
      quickCities.forEach((city) => {
        const button = document.createElement('button');
        button.className = 'quick-city-button';
        button.type = 'button';
        button.textContent = city.name;
        button.addEventListener('click', () => selectLocation(city.name, city.lat, city.lon, city.name));
        els.quickCities.appendChild(button);
      });
    }

    async function searchCities(query) {
      const trimmed = query.trim();
      if (trimmed.length < 2) {
        els.cityResults.innerHTML = '';
        return;
      }
      els.weatherStatus.textContent = t('weatherLoading');
      try {
        const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(trimmed)}&count=6&language=${state.language}&country=IT&format=json`;
        const response = await fetch(url);
        const data = await response.json();
        const results = Array.isArray(data.results) ? data.results : [];
        els.cityResults.innerHTML = '';
        results.forEach((item) => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'search-result';
          button.innerHTML = `<strong>${item.name}</strong><div class="muted">${item.admin1 || ''} · ${item.country || ''}</div>`;
          button.addEventListener('click', () => selectLocation(item.name, item.latitude, item.longitude, item.admin1 || item.name));
          els.cityResults.appendChild(button);
        });
        els.weatherStatus.textContent = results.length ? '' : t('weatherIdle');
      } catch {
        els.weatherStatus.textContent = t('weatherError');
      }
    }

    async function selectLocation(name, lat, lon, cityLabel) {
      els.citySearch.value = name;
      els.cityResults.innerHTML = '';
      updateMap(lat, lon, cityLabel || name);
      await loadWeather(lat, lon, cityLabel || name);
    }

    async function loadWeather(lat, lon, city) {
      els.weatherStatus.textContent = t('weatherLoading');
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,pressure_msl,wind_speed_10m,wind_direction_10m,weather_code&daily=sunrise,sunset&timezone=auto`;
        const response = await fetch(url);
        const data = await response.json();
        const current = data.current;
        const weatherCode = weatherCodes[current.weather_code] || weatherCodes[0];
        state.weather = {
          city,
          lat,
          lon,
          temperature: current.temperature_2m,
          humidity: current.relative_humidity_2m,
          pressure: current.pressure_msl,
          windSpeed: current.wind_speed_10m,
          windDirection: current.wind_direction_10m,
          weatherCode: current.weather_code,
          condition: weatherCode[state.language],
          icon: weatherCode.icon,
          sunriseLocal: data.daily?.sunrise?.[0] || null,
          sunsetLocal: data.daily?.sunset?.[0] || null,
          timezone: data.timezone || 'UTC',
          updatedAt: Date.now()
        };
        saveJson(storageKeys.weather, state.weather);
        els.weatherStatus.textContent = '';
        renderWeatherCards();
        renderSummaries();
        syncConversionFromWeather();
      } catch {
        els.weatherStatus.textContent = t('weatherError');
      }
    }

    function formatHm(dateString, timeZone = 'UTC') {
      if (!dateString) return '--:--';
      return new Intl.DateTimeFormat('en-GB', {
        hour: '2-digit',
        minute: '2-digit',
        hour12: false,
        timeZone
      }).format(new Date(dateString));
    }

    function formatDayLength(start, end) {
      if (!start || !end) return '--:--';
      const diff = Math.max(0, new Date(end) - new Date(start));
      const hours = Math.floor(diff / 3600000);
      const minutes = Math.floor((diff % 3600000) / 60000);
      return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
    }

    function renderWeatherCards() {
      if (!state.weather) {
        els.weatherCards.innerHTML = `<div class="weather-card"><strong>${t('weatherCondition')}</strong><small>${t('weatherIdle')}</small></div>`;
        return;
      }
      const weatherCode = weatherCodes[state.weather.weatherCode] || weatherCodes[0];
      const windKnots = state.weather.windSpeed * 0.539957;
      const sunriseUtc = formatHm(state.weather.sunriseLocal, 'UTC');
      const sunriseLocal = formatHm(state.weather.sunriseLocal, state.weather.timezone || 'UTC');
      const sunsetUtc = formatHm(state.weather.sunsetLocal, 'UTC');
      const sunsetLocal = formatHm(state.weather.sunsetLocal, state.weather.timezone || 'UTC');
      const dayLength = formatDayLength(state.weather.sunriseLocal, state.weather.sunsetLocal);
      const cards = [
        [t('weatherTemperature'), `${formatNumber(state.weather.temperature, 1)} °C`, '🌡️', getTemperatureTone(state.weather.temperature)],
        [t('weatherHumidity'), `${formatNumber(state.weather.humidity, 0)} %`, '💧', getHumidityTone(state.weather.humidity)],
        [t('weatherWindSpeed'), `${formatNumber(state.weather.windSpeed, 1)} km/h · ${formatNumber(windKnots, 1)} kts`, '💨', getWindTone(state.weather.windSpeed)],
        [t('weatherWindDirection'), `${formatNumber(state.weather.windDirection, 0)}°`, '🧭', ''],
        [t('weatherPressure'), `${formatNumber(state.weather.pressure, 1)} hPa`, '🧪', ''],
        [t('weatherCondition'), weatherCode[state.language], weatherCode.icon, getConditionTone(state.weather.weatherCode)],
        [t('weatherEphemeris'), `${t('sunrise')}: ${sunriseUtc} ${t('utcLabel')} / ${sunriseLocal} ${t('localLabel')}<br>${t('sunset')}: ${sunsetUtc} ${t('utcLabel')} / ${sunsetLocal} ${t('localLabel')}<br>${t('dayLength')}: ${dayLength}<br>${toDms(state.weather.lat, state.weather.lon)}`, '☀️🌙', 'sun']
      ];
      els.weatherCards.innerHTML = cards.map(([label, value, icon, tone]) => `
        <div class="weather-card"${tone ? ` data-tone="${tone}"` : ''}>
          <div class="weather-icon">${icon}</div>
          <strong>${label}</strong>
          <div>${value}</div>
          <small>${label === t('weatherEphemeris') ? state.weather.city : ''}</small>
        </div>
      `).join('');
    }

    function initializeMap() {
      if (!window.L) {
        return;
      }
      state.map = L.map('map', { zoomControl: true }).setView([42.5, 12.5], 5.5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(state.map);
      state.marker = L.marker([41.9028, 12.4964]).addTo(state.map);
      state.map.on('click', async (event) => {
        const { lat, lng } = event.latlng;
        updateMap(lat, lng, `${t('mapHint')} · ${toDms(lat, lng)}`);
        await reverseGeocode(lat, lng);
      });
    }

    function toDmsCoordinate(value, positive, negative) {
      const absolute = Math.abs(value);
      const degrees = Math.floor(absolute);
      const minutesFloat = (absolute - degrees) * 60;
      const minutes = Math.floor(minutesFloat);
      const seconds = ((minutesFloat - minutes) * 60).toFixed(1);
      const direction = value >= 0 ? positive : negative;
      return `${degrees}°${minutes}'${seconds}"${direction}`;
    }

    function toDms(lat, lon) {
      return `${toDmsCoordinate(lat, 'N', 'S')} ${toDmsCoordinate(lon, 'E', 'W')}`;
    }

    function updateMap(lat, lon, label) {
      if (!state.map || !state.marker) {
        return;
      }
      state.marker.setLatLng([lat, lon]).bindPopup(`${label}<br>${toDms(lat, lon)}`).openPopup();
      state.map.setView([lat, lon], 8);
    }

    async function reverseGeocode(lat, lon) {
      try {
        const url = `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=${state.language}&format=json`;
        const response = await fetch(url);
        const data = await response.json();
        const result = Array.isArray(data.results) && data.results[0] ? data.results[0] : null;
        const city = result ? result.name : `${lat.toFixed(2)}, ${lon.toFixed(2)}`;
        await selectLocation(city, lat, lon, city);
      } catch {
        await loadWeather(lat, lon, `${lat.toFixed(2)}, ${lon.toFixed(2)}`);
      }
    }

    function toggleGeolocation() {
      state.geolocationEnabled = !state.geolocationEnabled;
      localStorage.setItem(storageKeys.geolocation, String(state.geolocationEnabled));
      updateGeoToggleAppearance();
      if (!state.geolocationEnabled) {
        return;
      }
      if (!navigator.geolocation) {
        els.weatherStatus.textContent = t('geolocationDenied');
        return;
      }
      els.weatherStatus.textContent = t('geolocationSearching');
      navigator.geolocation.getCurrentPosition(async (position) => {
        const { latitude, longitude } = position.coords;
        updateMap(latitude, longitude, 'GPS');
        await reverseGeocode(latitude, longitude);
      }, () => {
        els.weatherStatus.textContent = t('geolocationDenied');
      }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 300000 });
    }

    function updateConversion() {
      const inputValue = Number(els.massInput.value || 0);
      const tempC = getCurrentTempC();
      const pressureHpa = getCurrentPressureHpa();
      const density = computeDensity(tempC, pressureHpa);
      const liters = state.mode === 'kg-to-liters' ? inputValue / density : inputValue;
      const massKg = state.mode === 'kg-to-liters' ? inputValue : inputValue * density;
      const primaryValue = state.mode === 'kg-to-liters' ? liters : massKg;
      const primaryUnit = state.mode === 'kg-to-liters' ? 'L' : 'kg';
      const usGallons = liters * 0.2641720524;
      const impGallons = liters * 0.2199692483;

      els.primaryResult.textContent = `${formatNumber(primaryValue, 2)} ${primaryUnit}`;
      els.primaryResultMeta.textContent = `${getFuelProfile().label} · ${state.mode === 'kg-to-liters' ? t('modeKgToLiters') : t('modeLitersToKg')}`;
      els.litersResult.textContent = `${formatNumber(liters, 2)} L`;
      els.litersMeta.textContent = `${formatNumber(massKg, 2)} kg`;
      els.usGallonsResult.textContent = `${formatNumber(usGallons, 2)} gal US`;
      els.usGallonsMeta.textContent = `${formatNumber(liters, 2)} L`;
      els.impGallonsResult.textContent = `${formatNumber(impGallons, 2)} gal Imp`;
      els.impGallonsMeta.textContent = `${formatNumber(liters, 2)} L`;
      els.densityResult.textContent = `${formatNumber(density, 4)} kg/L`;
      els.densityMeta.textContent = `${formatNumber(tempC, 1)} °C · ${formatNumber(pressureHpa, 1)} hPa`;
      els.weatherLinkedResult.textContent = state.weather ? `${formatNumber(state.weather.temperature, 1)} °C · ${formatNumber(state.weather.pressure, 1)} hPa` : t('weatherLinkedNo');
      els.weatherLinkedMeta.textContent = state.weather ? `${state.weather.city} · ${toDms(state.weather.lat, state.weather.lon)}` : t('noWeatherData');

      const entry = {
        id: Date.now(),
        timestamp: Date.now(),
        fuelType: getFuelProfile().label,
        mode: state.mode,
        massKg,
        volumeLiters: liters,
        density,
        temperatureC: tempC,
        pressureHpa,
        weatherCity: state.weather?.city || null
      };
      state.currentCalculation = entry;
      updateLogVolumeFromMass();
    }

    function saveCurrentCalculation() {
      pushHistory();
      els.conversionStatus.textContent = t('historySaved');
    }

    function buildShareMessage() {
      const entry = state.currentCalculation;
      if (!entry) {
        return '';
      }
      return [
        `Città: ${state.weather?.city || '-'}`,
        `Kg: ${formatNumber(entry.massKg, 2)}`,
        `Litri: ${formatNumber(entry.volumeLiters, 2)}`,
        `Temperatura: ${formatNumber(entry.temperatureC, 1)}°C`,
        `Pressione: ${formatNumber(entry.pressureHpa, 2)} hPa`,
        `Densità: ${formatNumber(entry.density, 4)} kg/L`,
        `Umidità: ${state.weather ? `${formatNumber(state.weather.humidity, 0)}%` : '-'}`,
        `Vento: ${state.weather ? `${formatNumber(state.weather.windSpeed, 1)} km/h` : '-'}`
      ].join('\n');
    }

    function shareOnWhatsApp() {
      const message = buildShareMessage();
      if (!message) {
        return;
      }
      const url = `https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`;
      window.open(url, '_blank', 'noopener,noreferrer');
    }

    function syncMassControls(fromSlider = false) {
      if (fromSlider) {
        els.massInput.value = els.massSlider.value;
      } else {
        els.massSlider.value = Math.min(2000, Math.max(0, Number(els.massInput.value || 0)));
      }
      updateSliderVisual(els.massSlider, ['#ffd54a', '#ffd54a', '#ffd54a']);
      updateConversion();
    }

    function syncTemperatureControls(fromSlider = false) {
      if (fromSlider) {
        setTemperatureDisplay(Number(els.temperatureSlider.value));
      } else {
        const tempC = Number(els.temperatureInput.value || 0);
        els.temperatureSlider.value = Math.min(60, Math.max(-40, tempC));
        updateSliderVisual(els.temperatureSlider, ['#ffd54a', '#ff9f1c', '#ff5a36']);
      }
      updateConversion();
    }

    function syncPressureControls(fromSlider = false) {
      if (fromSlider) {
        setPressureDisplay(Number(els.pressureSlider.value));
      } else {
        const pressureHpa = Number(els.pressureInput.value || 0);
        els.pressureSlider.value = Math.min(1100, Math.max(800, pressureHpa));
        updateSliderVisual(els.pressureSlider, ['#4da3ff', '#2fd0c8', '#6fe38a']);
      }
      updateConversion();
    }

    function pushHistory() {
      if (!state.currentCalculation) {
        return;
      }
      state.history = [state.currentCalculation, ...state.history.filter((item) => item.id !== state.currentCalculation.id)].slice(0, 20);
      saveJson(storageKeys.history, state.history);
      renderHistory();
    }

    function renderHistory() {
      if (!state.history.length) {
        els.historyList.innerHTML = `<div class="history-item">${t('historyEmpty')}</div>`;
        return;
      }
      els.historyList.innerHTML = state.history.map((entry) => `
        <div class="history-item">
          <strong>${formatDateTime(entry.timestamp)} · ${entry.fuelType}</strong>
          <small>
            ${formatNumber(entry.massKg, 2)} kg · ${formatNumber(entry.volumeLiters, 2)} L ·
            ${formatNumber(entry.density, 4)} kg/L · ${formatNumber(entry.temperatureC, 1)} °C ·
            ${formatNumber(entry.pressureHpa, 1)} hPa
          </small>
        </div>
      `).join('');
    }

    function clearHistory() {
      state.history = [];
      saveJson(storageKeys.history, state.history);
      renderHistory();
      els.conversionStatus.textContent = t('historyCleared');
    }

    function csvEscape(value) {
      return `"${String(value ?? '').replace(/"/g, '""')}"`;
    }

    function downloadFile(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename;
      link.click();
      URL.revokeObjectURL(url);
    }

    function exportHistoryCsv() {
      if (!state.history.length) {
        els.conversionStatus.textContent = t('noHistoryExport');
        return;
      }
      const rows = [
        ['timestamp', 'fuelType', 'massKg', 'volumeLiters', 'density', 'temperatureC', 'pressureHpa']
      ].concat(state.history.map((entry) => [
        entry.timestamp, entry.fuelType, entry.massKg, entry.volumeLiters, entry.density, entry.temperatureC, entry.pressureHpa
      ]));
      const csv = rows.map((row) => row.map(csvEscape).join(',')).join('\n');
      downloadFile(`${t('exportFilenameHistory')}.csv`, csv, 'text/csv;charset=utf-8');
      els.conversionStatus.textContent = t('csvDone');
    }

    function exportLogCsv() {
      if (!state.logEntries.length) {
        els.logStatus.textContent = t('noLogExport');
        return;
      }
      const rows = [
        ['date', 'location', 'registration', 'fuelType', 'massKg', 'volumeLiters', 'density', 'temperatureC', 'pressureHpa', 'humidity', 'notes']
      ].concat(state.logEntries.map((entry) => [
        entry.date, entry.location, entry.registration, entry.fuelType, entry.massKg, entry.volumeLiters, entry.density, entry.temperatureC, entry.pressureHpa, entry.humidity, entry.notes
      ]));
      const csv = rows.map((row) => row.map(csvEscape).join(',')).join('\n');
      downloadFile(`${t('exportFilenameLog')}.csv`, csv, 'text/csv;charset=utf-8');
      els.logStatus.textContent = t('csvDone');
    }

    function exportPdf(title, lines, filename, statusElement) {
      if (!window.jspdf || !window.jspdf.jsPDF) {
        statusElement.textContent = t('pdfFallback');
        return;
      }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(16);
      doc.text(title, 14, 18);
      doc.setFontSize(10);
      let y = 28;
      lines.forEach((line) => {
        const wrapped = doc.splitTextToSize(line, 180);
        doc.text(wrapped, 14, y);
        y += wrapped.length * 6;
        if (y > 280) {
          doc.addPage();
          y = 18;
        }
      });
      doc.save(filename);
      statusElement.textContent = t('pdfDone');
    }

    function exportCurrentPdf() {
      pushHistory();
      const message = buildShareMessage();
      if (!message) {
        return;
      }
      exportPdf('Jet Fuel Current Calculation', message.split('\n'), `${t('exportFilenameCurrent')}.pdf`, els.conversionStatus);
    }

    function exportHistoryPdf() {
      if (!state.history.length) {
        els.conversionStatus.textContent = t('noHistoryExport');
        return;
      }
      exportPdf('Jet Fuel History', state.history.map((entry) =>
        `${formatDateTime(entry.timestamp)} | ${entry.fuelType} | ${formatNumber(entry.massKg, 2)} kg | ${formatNumber(entry.volumeLiters, 2)} L | ${formatNumber(entry.density, 4)} kg/L`
      ), `${t('exportFilenameHistory')}.pdf`, els.conversionStatus);
    }

    function exportLogPdf() {
      const entries = getSortedLogEntries();
      if (!entries.length) {
        els.logStatus.textContent = t('noLogExport');
        return;
      }
      exportPdf('Jet Fuel Refueling Log', entries.map((entry) =>
        `${entry.date} | ${entry.location} | ${entry.registration} | ${entry.fuelType} | ${formatNumber(entry.massKg, 2)} kg | ${formatNumber(entry.volumeLiters, 2)} L | ${formatNumber(entry.density, 4)} kg/L`
      ), `${t('exportFilenameLog')}.pdf`, els.logStatus);
    }

    function updateLogVolumeFromMass() {
      const massKg = Number(els.logMassKg.value || 0);
      const tempC = Number(els.logTemperature.value || getCurrentTempC() || 15);
      const pressureHpa = Number(els.logPressure.value || getCurrentPressureHpa() || 1013.25);
      const density = computeDensity(tempC, pressureHpa, els.logFuelType.value || state.fuelType);
      if (massKg > 0) {
        els.logVolumeLiters.value = formatPlain(massKg / density, 1);
      }
    }

    function getLogFormData() {
      const fuelKey = els.logFuelType.value || state.fuelType;
      const tempC = Number(els.logTemperature.value || 15);
      const pressureHpa = Number(els.logPressure.value || 1013.25);
      const density = computeDensity(tempC, pressureHpa, fuelKey);
      return {
        id: state.editingLogId || Date.now(),
        date: els.logDate.value || new Date().toISOString().slice(0, 10),
        location: els.logLocation.value.trim(),
        registration: els.logRegistration.value.trim(),
        fuelType: getFuelProfile(fuelKey).label,
        fuelKey,
        massKg: Number(els.logMassKg.value || 0),
        volumeLiters: Number(els.logVolumeLiters.value || 0),
        density,
        temperatureC: tempC,
        pressureHpa,
        humidity: Number(els.logHumidity.value || 0),
        notes: els.logNotes.value.trim(),
        createdAt: state.editingLogId ? undefined : Date.now()
      };
    }

    function saveLogEntry() {
      const entry = getLogFormData();
      if (!entry.location || !entry.registration || !entry.massKg) {
        els.logStatus.textContent = t('logSubtitle');
        return;
      }
      if (!entry.volumeLiters) {
        entry.volumeLiters = Number(formatPlain(entry.massKg / entry.density, 1));
      }
      if (state.editingLogId) {
        state.logEntries = state.logEntries.map((item) => item.id === state.editingLogId ? { ...item, ...entry } : item);
        els.logStatus.textContent = t('logUpdated');
      } else {
        state.logEntries = [entry, ...state.logEntries];
        els.logStatus.textContent = t('logSaved');
      }
      saveJson(storageKeys.log, state.logEntries);
      renderLog();
      state.editingLogId = null;
      resetLogForm(false);
    }

    function resetLogForm(showStatus = true) {
      els.logDate.value = new Date().toISOString().slice(0, 10);
      els.logLocation.value = state.weather?.city || '';
      els.logRegistration.value = '';
      els.logFuelType.value = state.fuelType;
      els.logMassKg.value = state.currentCalculation ? formatPlain(state.currentCalculation.massKg, 1) : '';
      els.logVolumeLiters.value = state.currentCalculation ? formatPlain(state.currentCalculation.volumeLiters, 1) : '';
      els.logTemperature.value = state.weather ? formatPlain(state.weather.temperature, 1) : formatPlain(getCurrentTempC(), 1);
      els.logPressure.value = state.weather ? formatPlain(state.weather.pressure, 1) : formatPlain(getCurrentPressureHpa(), 1);
      els.logHumidity.value = state.weather ? formatPlain(state.weather.humidity, 0) : '';
      els.logNotes.value = '';
      state.editingLogId = null;
      if (showStatus) {
        els.logStatus.textContent = t('logResetDone');
      }
    }

    function autofillLogWeather() {
      if (!state.weather) {
        els.logStatus.textContent = t('noWeatherData');
        return;
      }
      els.logLocation.value = state.weather.city;
      els.logTemperature.value = formatPlain(state.weather.temperature, 1);
      els.logPressure.value = formatPlain(state.weather.pressure, 1);
      els.logHumidity.value = formatPlain(state.weather.humidity, 0);
      updateLogVolumeFromMass();
    }

    function autofillLogCalculation() {
      if (!state.currentCalculation) {
        return;
      }
      els.logFuelType.value = state.fuelType;
      els.logMassKg.value = formatPlain(state.currentCalculation.massKg, 1);
      els.logVolumeLiters.value = formatPlain(state.currentCalculation.volumeLiters, 1);
      els.logTemperature.value = formatPlain(state.currentCalculation.temperatureC, 1);
      els.logPressure.value = formatPlain(state.currentCalculation.pressureHpa, 1);
    }

    function getSortedLogEntries() {
      const direction = state.logSortDirection === 'asc' ? 1 : -1;
      return [...state.logEntries].sort((a, b) => {
        const left = a[state.logSortKey];
        const right = b[state.logSortKey];
        if (left < right) return -1 * direction;
        if (left > right) return 1 * direction;
        return 0;
      });
    }

    function renderLog() {
      const entries = getSortedLogEntries();
      els.logTableBody.innerHTML = entries.map((entry) => `
        <tr>
          <td>${entry.date}</td>
          <td>${entry.location}</td>
          <td>${entry.registration}</td>
          <td>${entry.fuelType}</td>
          <td>${formatNumber(entry.massKg, 2)}</td>
          <td>${formatNumber(entry.volumeLiters, 2)}</td>
          <td>${formatNumber(entry.density, 4)}</td>
          <td>
            <div class="button-row">
              <button class="ghost-button" data-edit-log="${entry.id}">${t('edit')}</button>
              <button class="ghost-button" data-delete-log="${entry.id}">${t('delete')}</button>
            </div>
          </td>
        </tr>
      `).join('');
      const totalKg = entries.reduce((sum, entry) => sum + Number(entry.massKg || 0), 0);
      const totalLiters = entries.reduce((sum, entry) => sum + Number(entry.volumeLiters || 0), 0);
      const avgDensity = entries.length ? entries.reduce((sum, entry) => sum + Number(entry.density || 0), 0) / entries.length : 0;
      els.logStatsEntries.textContent = String(entries.length);
      els.logStatsKg.textContent = formatNumber(totalKg, 2);
      els.logStatsLiters.textContent = formatNumber(totalLiters, 2);
      els.logStatsDensity.textContent = `${formatNumber(avgDensity, 4)} kg/L`;
    }

    function editLogEntry(id) {
      const entry = state.logEntries.find((item) => item.id === id);
      if (!entry) {
        return;
      }
      state.editingLogId = id;
      els.logDate.value = entry.date;
      els.logLocation.value = entry.location;
      els.logRegistration.value = entry.registration;
      els.logFuelType.value = entry.fuelKey || state.fuelType;
      els.logMassKg.value = formatPlain(entry.massKg, 1);
      els.logVolumeLiters.value = formatPlain(entry.volumeLiters, 1);
      els.logTemperature.value = formatPlain(entry.temperatureC, 1);
      els.logPressure.value = formatPlain(entry.pressureHpa, 1);
      els.logHumidity.value = formatPlain(entry.humidity, 0);
      els.logNotes.value = entry.notes || '';
    }

    function deleteLogEntry(id) {
      state.logEntries = state.logEntries.filter((item) => item.id !== id);
      saveJson(storageKeys.log, state.logEntries);
      renderLog();
      els.logStatus.textContent = t('logDeleted');
    }

    function attachLogHandlers() {
      els.logTableBody.addEventListener('click', (event) => {
        const editButton = event.target.closest('[data-edit-log]');
        const deleteButton = event.target.closest('[data-delete-log]');
        if (editButton) {
          editLogEntry(Number(editButton.dataset.editLog));
        }
        if (deleteButton) {
          deleteLogEntry(Number(deleteButton.dataset.deleteLog));
        }
      });
      document.querySelectorAll('[data-sort]').forEach((button) => {
        button.addEventListener('click', () => {
          const key = button.dataset.sort;
          if (state.logSortKey === key) {
            state.logSortDirection = state.logSortDirection === 'asc' ? 'desc' : 'asc';
          } else {
            state.logSortKey = key;
            state.logSortDirection = key === 'date' ? 'desc' : 'asc';
          }
          renderLog();
        });
      });
    }

    function setPresetActive(container, value, attribute) {
      if (!container) return;
      container.querySelectorAll(`[${attribute}]`).forEach((button) => {
        button.classList.toggle('preset-active', button.getAttribute(attribute) === String(value));
      });
    }

    function updateConsumo() {
      const departure = Number(els.consumoDeparture?.value || 0);
      const hourly = Number(els.consumoHourly?.value || 0);
      const minutes = Number(els.consumoMinutes?.value || 0);
      const total = (hourly / 60) * minutes;
      const density = state.currentCalculation?.density || computeDensity(getCurrentTempC(), getCurrentPressureHpa());
      const remaining = departure - total;
      const refuelKg = total;
      const refuelLiters = density > 0 ? refuelKg / density : 0;
      if (els.consumoTotalValue) els.consumoTotalValue.textContent = `${formatNumber(total, 2)} kg`;
      if (els.consumoRemainingValue) els.consumoRemainingValue.textContent = `${formatNumber(Math.max(remaining, 0), 2)} kg`;
      if (els.consumoRefuelKgValue) els.consumoRefuelKgValue.textContent = `${formatNumber(refuelKg, 2)} kg`;
      if (els.consumoRefuelLitersValue) els.consumoRefuelLitersValue.textContent = `${formatNumber(refuelLiters, 2)} L`;
      if (els.consumoDensityMeta) els.consumoDensityMeta.textContent = `${formatNumber(density, 4)} kg/L`;
      if (els.consumoRefuelMeta) els.consumoRefuelMeta.textContent = `${formatNumber(total, 2)} kg`;
      if (els.consumoWarning) {
        const showWarning = !departure || remaining < 0;
        els.consumoWarning.textContent = showWarning ? t('consumoWarning') : '';
      }
      setPresetActive(els.consumoDeparturePresets, departure || '', 'data-consumo-departure');
      setPresetActive(els.consumoHourlyPresets, hourly || '', 'data-consumo-hourly');
      setPresetActive(els.consumoMinutesPresets, minutes || '', 'data-consumo-minutes');
    }

    function renderDensityTable() {
      const temperatures = [-40, -20, 0, 15, 30, 45, 60];
      els.densityTableBody.innerHTML = temperatures.map((temp) => {
        const jetA1 = computeDensity(temp, 1013.25, 'jetA1');
        const jetA = computeDensity(temp, 1013.25, 'jetA');
        const jetB = computeDensity(temp, 1013.25, 'jetB');
        const avgas = computeDensity(temp, 1013.25, 'avgas100ll');
        return `
          <tr>
            <td>${formatNumber(temp, 0)} °C</td>
            <td>${formatNumber(jetA1, 4)}</td>
            <td>${formatNumber(jetA, 4)}</td>
            <td>${formatNumber(jetB, 4)}</td>
            <td>${formatNumber(avgas, 4)}</td>
          </tr>
        `;
      }).join('');
    }

    function stopCoordsWatch() {
      if (state.coordsWatchId !== null && navigator.geolocation) {
        navigator.geolocation.clearWatch(state.coordsWatchId);
        state.coordsWatchId = null;
      }
    }

    function startCoordsWatch() {
      if (!navigator.geolocation) {
        els.coordsLat.textContent = t('coordsUnavailable');
        els.coordsLon.textContent = '';
        return;
      }
      stopCoordsWatch();
      state.coordsWatchId = navigator.geolocation.watchPosition((position) => {
        const { latitude, longitude } = position.coords;
        els.coordsLat.textContent = `Lat: ${latitude.toFixed(6)} · ${toDmsCoordinate(latitude, 'N', 'S')}`;
        els.coordsLon.textContent = `Lon: ${longitude.toFixed(6)} · ${toDmsCoordinate(longitude, 'E', 'W')}`;
      }, () => {
        els.coordsLat.textContent = t('coordsUnavailable');
        els.coordsLon.textContent = '';
      }, { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 });
    }

    function toggleCoordsPanel() {
      const willShow = els.coordsPanel.classList.contains('hidden');
      els.coordsPanel.classList.toggle('hidden', !willShow);
      updateCoordsToggleAppearance();
      if (willShow) {
        startCoordsWatch();
      } else {
        stopCoordsWatch();
      }
    }

    function applyWeatherToConversion() {
      if (!state.weather) {
        els.weatherStatus.textContent = t('noWeatherData');
        return;
      }
      syncConversionFromWeather();
      els.conversionStatus.textContent = t('weatherApplied');
      window.location.hash = '#conversione';
    }

    function cleanupServiceWorkersAndCaches() {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          registrations.forEach((registration) => registration.unregister());
        }).catch(() => {});
      }
      if ('caches' in window) {
        caches.keys().then((keys) => Promise.all(keys.map((key) => caches.delete(key)))).catch(() => {});
      }
    }

    function initializeDefaults() {
      populateFuelSelects();
      renderQuickCities();
      renderTranslations();
      els.massInput.value = '1000';
      els.massSlider.value = '1000';
      setTemperatureDisplay(state.weather?.temperature ?? 15);
      setPressureDisplay(state.weather?.pressure ?? 1013.25);
      applyTheme(state.theme);
      applyLanguage(state.language);
      applyMode(state.mode);
      applyFuelType(state.fuelType);
      updateMassLabel();
      updateSliderVisual(els.massSlider, ['#ffd54a', '#ffd54a', '#ffd54a']);
      renderDensityTable();
      renderWeatherCards();
      renderHistory();
      renderLog();
      resetLogForm(false);
      updateConsumo();
      renderSummaries();
      renderRoute();
      cleanupServiceWorkersAndCaches();
      updateConversion();
      if (state.weather && state.map) {
        updateMap(state.weather.lat, state.weather.lon, state.weather.city);
      }
    }

    els.languageSelector.addEventListener('click', (event) => {
      const button = event.target.closest('[data-language]');
      if (button) {
        applyLanguage(button.dataset.language);
      }
    });

    els.themeSelector.addEventListener('click', (event) => {
      const button = event.target.closest('[data-theme-choice]');
      if (button) {
        applyTheme(button.dataset.themeChoice);
      }
    });

    els.modeSelector.addEventListener('click', (event) => {
      const button = event.target.closest('[data-mode]');
      if (button) {
        applyMode(button.dataset.mode);
      }
    });

    els.homeFuelType.addEventListener('change', (event) => applyFuelType(event.target.value));
    els.conversionFuelType.addEventListener('change', (event) => applyFuelType(event.target.value));
    els.logFuelType.addEventListener('change', updateLogVolumeFromMass);

    els.citySearch.addEventListener('input', () => {
      clearTimeout(state.geocodeTimer);
      state.geocodeTimer = setTimeout(() => searchCities(els.citySearch.value), 350);
    });

    els.geoToggle.addEventListener('click', toggleGeolocation);
    els.coordsToggleButton.addEventListener('click', toggleCoordsPanel);
    els.applyWeatherToConversion.addEventListener('click', applyWeatherToConversion);

    els.massInput.addEventListener('input', () => syncMassControls(false));
    els.massSlider.addEventListener('input', () => syncMassControls(true));
    els.temperatureInput.addEventListener('input', () => syncTemperatureControls(false));
    els.temperatureSlider.addEventListener('input', () => syncTemperatureControls(true));
    els.pressureInput.addEventListener('input', () => syncPressureControls(false));
    els.pressureSlider.addEventListener('input', () => syncPressureControls(true));

    els.saveCalculationButton.addEventListener('click', saveCurrentCalculation);
    els.shareWhatsappButton.addEventListener('click', shareOnWhatsApp);
    els.exportCurrentPdfButton.addEventListener('click', exportCurrentPdf);
    els.exportHistoryCsvButton.addEventListener('click', exportHistoryCsv);
    els.exportHistoryPdfButton.addEventListener('click', exportHistoryPdf);
    els.clearHistoryButton.addEventListener('click', clearHistory);
    els.logAutofillWeather.addEventListener('click', autofillLogWeather);
    els.logAutofillCalc.addEventListener('click', autofillLogCalculation);
    els.saveLogButton.addEventListener('click', saveLogEntry);
    els.resetLogButton.addEventListener('click', () => resetLogForm(true));
    els.exportLogCsvButton.addEventListener('click', exportLogCsv);
    els.exportLogPdfButton.addEventListener('click', exportLogPdf);
    els.consumoDeparture?.addEventListener('input', updateConsumo);
    els.consumoHourly?.addEventListener('input', updateConsumo);
    els.consumoMinutes?.addEventListener('input', updateConsumo);
    els.consumoDeparturePresets?.addEventListener('click', (event) => {
      const button = event.target.closest('[data-consumo-departure]');
      if (!button) return;
      els.consumoDeparture.value = button.dataset.consumoDeparture;
      updateConsumo();
    });
    els.consumoHourlyPresets?.addEventListener('click', (event) => {
      const button = event.target.closest('[data-consumo-hourly]');
      if (!button) return;
      els.consumoHourly.value = button.dataset.consumoHourly;
      updateConsumo();
    });
    els.consumoMinutesPresets?.addEventListener('click', (event) => {
      const button = event.target.closest('[data-consumo-minutes]');
      if (!button) return;
      els.consumoMinutes.value = button.dataset.consumoMinutes;
      updateConsumo();
    });
    window.addEventListener('hashchange', renderRoute);
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (state.theme === 'system') {
        applyTheme('system');
      }
    });

    initializeMap();
    attachLogHandlers();
    document.addEventListener('DOMContentLoaded', () => {
      initializeDefaults();
      renderRoute();
    }, { once: true });
    if (document.readyState !== 'loading') {
      initializeDefaults();
      renderRoute();
    }
  </script>
</body>
</html>
